# Options

set -g default-terminal "xterm-256color"
set -s escape-time 1                     # faster command sequences
set -sg repeat-time 600                   # increase repeat timeout
set -s focus-events on
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g @shell_mode 'vi'
set-option -g allow-passthrough on
# set -g destroy-unattached on
set-option -g detach-on-destroy off

# Keys and Binds

set-window-option -g mode-keys vi
unbind C-b
set -g prefix C-a

bind R source-file ~/.tmux.conf
bind -T copy-mode-vi 'v' send -X begin-selection # Begin selection in copy mode.
bind \; last-pane -Z
bind Space last-window # Switch to last window
bind t new-window -c "#{pane_current_path}"
bind / copy-mode \; send-key ?
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind X confirm-before "kill-session -t ''"
bind @ run-shell "(echo 'tmux pane: #{session_id}:#{window_id}:%#{pane_id}' | pbcopy) && tmux display-message 'Copied pane info to clipboard'"

# Claude
bind c display-popup -xC -yC -w80% -h60% -d '#{pane_current_path}' -E "fish $DOTFILES/tmux/scripts/claude-sessions-run.fish #{pane_current_path}"
bind g display-popup -xC -yC -w100% -h100% -d '#{pane_current_path}' -E "lazygit"
bind p display-popup -xC -yC -w100% -h100% -d '#{pane_current_path}' -E "fish ."

# Theme
set -g status-left-length 85
set -g status-left ""
set -g window-status-current-format "#[fg=black,bold bg=default] │#[fg=white bg=black]#I: #W#[fg=black,bold bg=default]│"
set -g window-status-format "|#[fg=white bg=default]#I: #W|"
set -g status-style bg=default
set -g status-right "#{pane_current_command}: #{session_id}:#{window_id}:#{pane_id}:"
set -g status-justify centre
set -g popup-border-lines rounded
set -g popup-border-style "fg=colour8"
set -g popup-style "bg=default"

set-option -g set-titles on
set-option -g set-titles-string 'tmux'

# Plugins
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'schasse/tmux-jump'

# TPM
set -g @plugin 'tmux-plugins/tpm'
run '~/.tmux/plugins/tpm/tpm'
